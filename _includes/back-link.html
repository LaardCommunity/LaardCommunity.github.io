<!-- Have we set up a back page for the page? Assign it to the back_page variable if so -->
{% if page.back_page %}
    {% assign back_page = site.pages | where: "name", page.back_page | first %}
{% else %}
    {% assign back_page = null %}
{% endif %}

<!-- If back_page has been assigned, produce a link to it -->
{% if back_page != null %}
    <p class="back-link">
    <a href="{{ back_page.url | relative_url }}"><span class="back-arrow icon">{% include svg/back-arrow.svg %}</span>
        {{ back_page.short_title | default: back_page.title }}</a>
    </p>
{% endif %}
